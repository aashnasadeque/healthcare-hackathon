<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Risk Dashboard</title>
  <style>
    :root {
      --bg: #F7F5F2;
      --surface: #FFFFFF;
      --border: #E4DDD5;
      --text: #1A1A1A;
      --text-muted: #6B6B6B;
      --accent: #2C5282;
      --accent-light: #EBF4FF;
      --red: #C53030;
      --red-bg: #FFF5F5;
      --red-border: #FEB2B2;
      --orange: #C05621;
      --orange-bg: #FFFAF0;
      --orange-border: #FBD38D;
      --green: #276749;
      --green-bg: #F0FFF4;
      --green-border: #9AE6B4;
      --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--accent);
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 12px;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.01em; }
    header p { font-size: 12px; opacity: 0.75; margin-top: 1px; }
    .header-stats { display: flex; gap: 16px; font-size: 12px; opacity: 0.9; flex-shrink: 0; }
    .header-stat { text-align: center; }
    .header-stat strong { display: block; font-size: 18px; font-weight: 700; }

    /* ── Main layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Patient list panel ── */
    .patient-list-panel {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .list-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-box {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .search-box:focus { border-color: var(--accent); }

    .list-filters {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .filter-btn {
      flex: 1;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .filter-btn.active-filter { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-btn:hover:not(.active-filter) { background: var(--border); }

    .patient-list {
      flex: 1;
      overflow-y: auto;
    }

    .patient-row {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .patient-row:hover { background: var(--bg); }
    .patient-row.selected { background: var(--accent-light); border-left: 3px solid var(--accent); }

    .risk-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .risk-dot.high { background: var(--red); }
    .risk-dot.medium { background: #DD6B20; }
    .risk-dot.low { background: var(--green); }

    .patient-row-info { flex: 1; min-width: 0; }
    .patient-row-name { font-weight: 600; font-size: 13px; }
    .patient-row-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .patient-row-flag { font-size: 11px; color: var(--text-muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .risk-score-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .risk-score-badge.high { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .risk-score-badge.medium { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
    .risk-score-badge.low { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }

    /* ── Detail panel ── */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      gap: 8px;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 15px; }
    .empty-state small { font-size: 12px; }

    /* ── Patient detail ── */
    .patient-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .patient-name-block h2 { font-size: 20px; font-weight: 700; }
    .patient-name-block p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    .risk-badge-large {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      border: 2px solid;
      flex-shrink: 0;
    }
    .risk-badge-large.high { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
    .risk-badge-large.medium { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); }
    .risk-badge-large.low { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }

    /* ── AI Summary ── */
    .ai-summary {
      background: var(--accent-light);
      border: 1px solid #BEE3F8;
      border-left: 4px solid var(--accent);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.6;
    }
    .ai-summary-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    /* ── Flags ── */
    .flags-section { margin-bottom: 16px; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .flags-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .flag-chip {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid;
    }
    .flag-chip.high { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
    .flag-chip.medium { background: var(--orange-bg); color: var(--orange); border-color: var(--orange-border); }
    .flag-chip.low { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 14px;
    }
    .tab {
      padding: 8px 14px;
      font-size: 13px;
      font-family: var(--font);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab:hover:not(.active) { color: var(--text); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Tables ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th {
      text-align: left;
      padding: 6px 10px;
      background: var(--bg);
      border-bottom: 2px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .data-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--bg); }

    .badge-er { background: var(--red-bg); color: var(--red); padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .badge-outpatient { background: var(--accent-light); color: var(--accent); padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .badge-abnormal { color: var(--red); font-weight: 700; }
    .badge-normal { color: var(--text-muted); }

    /* ── Vitals grid ── */
    .vitals-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .vital-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center;
    }
    .vital-card.alert { background: var(--red-bg); border-color: var(--red-border); }
    .vital-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
    .vital-value { font-size: 22px; font-weight: 700; margin: 4px 0 2px; }
    .vital-card.alert .vital-value { color: var(--red); }
    .vital-unit { font-size: 10px; color: var(--text-muted); }

    .loading-text { color: var(--text-muted); font-size: 13px; padding: 20px; text-align: center; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 640px) {
      .patient-list-panel { width: 100%; height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
      .layout { flex-direction: column; }
      .detail-panel { padding: 14px; }
      .vitals-grid { grid-template-columns: repeat(2, 1fr); }
      .header-stats { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Patient Risk Dashboard</h1>
    <p>Victoria, BC — Synthea Clinical Records</p>
  </div>
  <div class="header-stats" id="header-stats">
    <div class="header-stat"><strong id="stat-total">—</strong>Patients</div>
    <div class="header-stat"><strong id="stat-high" style="color:#FEB2B2">—</strong>High Risk</div>
    <div class="header-stat"><strong id="stat-medium" style="color:#FBD38D">—</strong>Med Risk</div>
  </div>
</header>

<div class="layout">

  <!-- Patient list -->
  <aside class="patient-list-panel">
    <div class="list-header">
      <input class="search-box" id="search" type="text" placeholder="Search by name or ID…" autocomplete="off" />
      <div class="list-filters">
        <button class="filter-btn active-filter" data-filter="all">All</button>
        <button class="filter-btn" data-filter="high" style="color:var(--red)">High</button>
        <button class="filter-btn" data-filter="medium" style="color:var(--orange)">Medium</button>
        <button class="filter-btn" data-filter="low" style="color:var(--green)">Low</button>
      </div>
    </div>
    <div class="patient-list" id="patient-list">
      <p class="loading-text">Loading patients…</p>
    </div>
  </aside>

  <!-- Detail panel -->
  <main class="detail-panel" id="detail-panel">
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <p>Select a patient to view their risk profile</p>
      <small>Patients are ranked by computed risk score</small>
    </div>
  </main>

</div>

<script>
  var API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';
  var allPatients = [];
  var currentFilter = 'all';
  var selectedId = null;

  // Load all patients
  fetch(API_BASE + '/api/patients?limit=200')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allPatients = data;
      updateStats(data);
      renderList(data);
    })
    .catch(function() {
      document.getElementById('patient-list').innerHTML = '<p class="loading-text">Could not load patients.</p>';
    });

  function updateStats(patients) {
    document.getElementById('stat-total').textContent = patients.length;
    document.getElementById('stat-high').textContent = patients.filter(function(p) { return p.risk_level === 'high'; }).length;
    document.getElementById('stat-medium').textContent = patients.filter(function(p) { return p.risk_level === 'medium'; }).length;
  }

  function renderList(patients) {
    var filtered = currentFilter === 'all' ? patients : patients.filter(function(p) { return p.risk_level === currentFilter; });
    var el = document.getElementById('patient-list');
    if (filtered.length === 0) {
      el.innerHTML = '<p class="loading-text">No patients match this filter.</p>';
      return;
    }
    el.innerHTML = filtered.map(function(p) {
      var levelLabel = p.risk_level === 'high' ? 'HIGH' : p.risk_level === 'medium' ? 'MED' : 'LOW';
      var topFlag = p.top_flags && p.top_flags.length > 0 ? p.top_flags[0] : 'No critical flags';
      return '<div class="patient-row' + (selectedId === p.patient_id ? ' selected' : '') + '" data-id="' + p.patient_id + '">' +
        '<div class="risk-dot ' + p.risk_level + '"></div>' +
        '<div class="patient-row-info">' +
          '<div class="patient-row-name">' + p.first_name + ' ' + p.last_name + '</div>' +
          '<div class="patient-row-meta">' + p.age + 'yo ' + p.sex + ' · ' + p.patient_id + '</div>' +
          '<div class="patient-row-flag">' + topFlag + '</div>' +
        '</div>' +
        '<span class="risk-score-badge ' + p.risk_level + '">' + levelLabel + ' ' + p.risk_score + '</span>' +
      '</div>';
    }).join('');

    el.querySelectorAll('.patient-row').forEach(function(row) {
      row.addEventListener('click', function() {
        selectedId = this.getAttribute('data-id');
        loadPatient(selectedId);
        renderList(allPatients.filter(function(p) {
          var s = document.getElementById('search').value.toLowerCase();
          return !s || p.first_name.toLowerCase().includes(s) || p.last_name.toLowerCase().includes(s) || p.patient_id.toLowerCase().includes(s);
        }));
      });
    });
  }

  // Search
  document.getElementById('search').addEventListener('input', function() {
    var s = this.value.toLowerCase();
    var filtered = s ? allPatients.filter(function(p) {
      return p.first_name.toLowerCase().includes(s) || p.last_name.toLowerCase().includes(s) || p.patient_id.toLowerCase().includes(s);
    }) : allPatients;
    renderList(filtered);
  });

  // Filters
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active-filter'); });
      this.classList.add('active-filter');
      currentFilter = this.getAttribute('data-filter');
      var s = document.getElementById('search').value.toLowerCase();
      var filtered = s ? allPatients.filter(function(p) {
        return p.first_name.toLowerCase().includes(s) || p.last_name.toLowerCase().includes(s);
      }) : allPatients;
      renderList(filtered);
    });
  });

  // Load patient detail
  function loadPatient(patientId) {
    var panel = document.getElementById('detail-panel');
    panel.innerHTML = '<p class="loading-text">Loading patient data…</p>';

    fetch(API_BASE + '/api/patient/' + patientId)
      .then(function(r) { return r.json(); })
      .then(function(p) { renderDetail(p); })
      .catch(function() {
        panel.innerHTML = '<p class="loading-text">Could not load patient details.</p>';
      });
  }

  function renderDetail(p) {
    var panel = document.getElementById('detail-panel');
    var levelLabel = p.risk_level === 'high' ? 'HIGH RISK' : p.risk_level === 'medium' ? 'MEDIUM RISK' : 'LOW RISK';

    var flagsHtml = p.flags.map(function(f) {
      return '<span class="flag-chip ' + f.severity + '">' + f.label + '</span>';
    }).join('');
    if (!flagsHtml) flagsHtml = '<span class="flag-chip low">No critical flags identified</span>';

    // Encounters tab
    var encHtml = p.recent_encounters.length === 0 ? '<p style="color:var(--text-muted);padding:12px">No encounters on record.</p>' :
      '<table class="data-table"><thead><tr><th>Date</th><th>Type</th><th>Facility</th><th>Complaint</th><th>Diagnosis</th><th>Triage</th></tr></thead><tbody>' +
      p.recent_encounters.map(function(e) {
        var badge = e.encounter_type === 'emergency' ? '<span class="badge-er">ER</span>' : '<span class="badge-outpatient">' + e.encounter_type + '</span>';
        var triage = e.triage_level <= 2 ? '<strong style="color:var(--red)">' + e.triage_level + '</strong>' : e.triage_level;
        return '<tr><td>' + e.encounter_date + '</td><td>' + badge + '</td><td>' + e.facility + '</td><td>' + e.chief_complaint + '</td><td>' + e.diagnosis_description + '</td><td>' + triage + '</td></tr>';
      }).join('') + '</tbody></table>';

    // Meds tab
    var medsHtml = p.active_medications.length === 0 ? '<p style="color:var(--text-muted);padding:12px">No active medications.</p>' :
      '<table class="data-table"><thead><tr><th>Drug</th><th>Dose</th><th>Frequency</th><th>Prescriber</th><th>Since</th></tr></thead><tbody>' +
      p.active_medications.map(function(m) {
        return '<tr><td><strong>' + m.drug_name + '</strong></td><td>' + m.dosage + '</td><td>' + m.frequency + '</td><td>' + m.prescriber + '</td><td>' + m.start_date + '</td></tr>';
      }).join('') + '</tbody></table>';

    // Labs tab
    var labsHtml = p.recent_labs.length === 0 ? '<p style="color:var(--text-muted);padding:12px">No lab results on record.</p>' :
      '<table class="data-table"><thead><tr><th>Test</th><th>Result</th><th>Reference</th><th>Flag</th><th>Date</th></tr></thead><tbody>' +
      p.recent_labs.map(function(l) {
        var isAbnormal = l.abnormal_flag && l.abnormal_flag !== 'N';
        var flagClass = isAbnormal ? 'badge-abnormal' : 'badge-normal';
        return '<tr><td>' + l.test_name + '</td><td><strong>' + l.value + '</strong> ' + l.unit + '</td><td>' + l.reference_range + ' ' + l.unit + '</td><td class="' + flagClass + '">' + (isAbnormal ? '⚠ ' : '') + l.abnormal_flag + '</td><td>' + l.collected_date + '</td></tr>';
      }).join('') + '</tbody></table>';

    // Vitals tab
    var vitalsHtml = '<p style="color:var(--text-muted);padding:12px">No vitals on record.</p>';
    if (p.latest_vitals) {
      var v = p.latest_vitals;
      var o2Alert = v.o2_saturation < 95;
      var bpAlert = v.systolic_bp >= 140;
      var hrAlert = v.heart_rate > 100 || v.heart_rate < 55;
      var tempAlert = v.temperature_celsius >= 38.5;
      vitalsHtml = '<p style="font-size:11px;color:var(--text-muted);margin-bottom:10px">Recorded: ' + v.recorded_at + '</p>' +
        '<div class="vitals-grid">' +
        vitalCard('Heart Rate', v.heart_rate, 'bpm', hrAlert) +
        vitalCard('Blood Pressure', v.systolic_bp + '/' + v.diastolic_bp, 'mmHg', bpAlert) +
        vitalCard('O₂ Saturation', v.o2_saturation, '%', o2Alert) +
        vitalCard('Temperature', v.temperature_celsius, '°C', tempAlert) +
        vitalCard('Resp. Rate', v.respiratory_rate, '/min', false) +
        vitalCard('Pain Scale', v.pain_scale, '/10', v.pain_scale >= 7) +
        '</div>';
    }

    panel.innerHTML =
      '<div class="patient-header">' +
        '<div class="patient-name-block">' +
          '<h2>' + p.first_name + ' ' + p.last_name + '</h2>' +
          '<p>' + p.age + 'yo ' + p.sex + ' · DOB ' + p.date_of_birth + ' · ' + p.postal_code + ' · ' + p.primary_language + ' · ' + p.blood_type + '</p>' +
        '</div>' +
        '<div class="risk-badge-large ' + p.risk_level + '">' + levelLabel + ' — Score ' + p.risk_score + '</div>' +
      '</div>' +

      '<div class="ai-summary">' +
        '<div class="ai-summary-label">AI Clinical Summary</div>' +
        p.ai_summary +
      '</div>' +

      '<div class="flags-section">' +
        '<div class="section-title">Risk Flags</div>' +
        '<div class="flags-list">' + flagsHtml + '</div>' +
      '</div>' +

      '<div class="tabs">' +
        '<button class="tab active" data-tab="encounters">Encounters (' + p.recent_encounters.length + ')</button>' +
        '<button class="tab" data-tab="meds">Medications (' + p.active_medications.length + ')</button>' +
        '<button class="tab" data-tab="labs">Labs (' + p.recent_labs.length + ')</button>' +
        '<button class="tab" data-tab="vitals">Vitals</button>' +
      '</div>' +

      '<div class="tab-content active" id="tab-encounters">' + encHtml + '</div>' +
      '<div class="tab-content" id="tab-meds">' + medsHtml + '</div>' +
      '<div class="tab-content" id="tab-labs">' + labsHtml + '</div>' +
      '<div class="tab-content" id="tab-vitals">' + vitalsHtml + '</div>';

    // Tab switching
    panel.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        panel.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        panel.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        this.classList.add('active');
        panel.querySelector('#tab-' + this.getAttribute('data-tab')).classList.add('active');
      });
    });
  }

  function vitalCard(label, value, unit, alert) {
    return '<div class="vital-card' + (alert ? ' alert' : '') + '">' +
      '<div class="vital-label">' + label + '</div>' +
      '<div class="vital-value">' + value + '</div>' +
      '<div class="vital-unit">' + unit + '</div>' +
    '</div>';
  }
</script>
</body>
</html>
